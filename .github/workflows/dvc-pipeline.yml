name: DVC Pipeline - Reindex Documents

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'data/pdfs/**'
      - 'src/ingestion.py'
      - 'src/embeddings_store.py'
      - 'dvc.yaml'
  workflow_dispatch:  # Allow manual triggering

jobs:
  reindex:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt
      
      - name: Initialize DVC
        run: |
          dvc init --no-scm
          # Configure DVC (optional: set up remote storage)
          # dvc remote add -d myremote s3://your-bucket/dvc-storage
      
      - name: Run DVC pipeline
        run: |
          echo "Running DVC pipeline to reindex documents..."
          dvc repro
      
      - name: Check pipeline status
        run: |
          dvc status
          if [ -f metrics.json ]; then
            echo "Metrics:"
            cat metrics.json
          fi
      
      - name: Commit updated ChromaDB (optional)
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/chroma_db.dvc metrics.json
          git diff --staged --quiet || git commit -m "Auto-update: Reindexed documents via DVC pipeline [skip ci]"
          git push || echo "No changes to commit or push failed"
        continue-on-error: true

